## A Unified Platform for Network Orchestration, Telemetry, and Configuration Lifecycle

This document provides a detailed technical presentation and architectural breakdown of the **Enterprise SDN Controller**. The solution is designed as a native, secure, and multi-tenant platform that consolidates network orchestration, real-time topology discovery, telemetry collection, and configuration lifecycle management into a single unified plane.

---

## 1. Executive Summary & Value Proposition

The **Enterprise SDN Controller** is a next-generation network management and automation system. It establishes a **Visibility, Telemetry & Config Lifecycle Plane** directly integrated into the core SDN orchestration layer.

### Key Value Pillars
*   **Real-Time Operations**: Uses active gNMI push streaming rather than traditional polling, ensuring the network topology and metrics database are updated in sub-second intervals.
*   **Unified Security and RBAC**: Features strict tenant-boundary isolation and a custom JWT-based authorization model that spans provisioning, configuration restore, and read-only auditing actions.
*   **End-to-End Configuration Immutability**: All configuration events, snap-shots, and rollbacks are cryptographically hashed and stored in an append-only registry for bulletproof compliance.
*   **Multi-Vendor Integration**: Employs a driver abstraction model supporting Arista EOS, Dell OS10, and Nokia SR Linux platforms seamlessly.

---

## 3. Core Features & Functional Walkthroughs

### 3.1. Zero-Touch Provisioning (ZTP) Onboarding
When a newly unboxed switch boots for the first time, it requests an IP address via DHCP and triggers a phone-home ingestion signal to the controller.

\`\`\`mermaid
sequenceDiagram
    autonumber
    participant Switch as Bare-Metal Switch
    participant DHCP as DHCP Server
    participant Controller as SDN Controller API
    participant DB as SQLite/Postgres DB

    Switch->>DHCP: 1. DHCP Discover (ZTP Option)
    DHCP-->>Switch: 2. Offer IP & Option 67 (ZTP Boot Script URL)
    Switch->>Switch: 3. Execute Boot Script
    Switch->>Controller: 4. POST /api/v5/discovery/on-boarding-ingestion (MAC, Serial, OS, Vendor)
    Note over Controller: Ingests switch specs from payload & IP from connection headers
    Controller->>DB: 5. Create or Update ztp_discovery_pool Record
    Controller-->>Switch: 6. Return 202 Accepted
\`\`\`

*   **Ingestion Endpoint**: \`POST /api/v5/discovery/on-boarding-ingestion\`
*   **Database Table**: \`ztp_discovery_pool\` ([models.py:L44-59](file:///c:/Users/mosta/OneDrive/Desktop/Antigravity/Network%20SDN%20Controller/app/models.py#L44-L59))

---

### 3.2. Multi-Tenant Policy Engine (4-Stage Pipeline)
To ensure that tenants cannot interfere with each other's logical networks (VLAN/VRF/Subnet overlapping), any routing change must pass the 4-stage pipeline.

\`\`\`mermaid
flowchart TD
    Start([1. Policy Intent Submitted]) --> Stage1{Stage 1: Syntax Validation}
    Stage1 -- Fail --> Reject[400 Bad Request: Invalid CIDR/Schema]
    Stage1 -- Pass --> Stage2{Stage 2: Tenant Isolation}
    
    Stage2 -- Overlap Detected --> Reject
    Stage2 -- Unique IP/VRF Scope --> Stage3{Stage 3: Topology & VLAN Collision}
    
    Stage3 -- VLAN in Use on Fabric --> Reject
    Stage3 -- Available --> Stage4{Stage 4: Dry-Run Generate Diff}
    
    Stage4 --> DryRunCheck{Is dry_run=True?}
    DryRunCheck -- Yes --> ReturnDiff[202 Accepted: Return Config Diff Matrix]
    DryRunCheck -- No --> Commit[Commit IPAM & Dispatch to Southbound Queue]
\`\`\`

*   **Endpoint**: \`POST /api/v5/orchestrator/policy-enforcement\` ([main.py:L272-456](file:///c:/Users/mosta/OneDrive/Desktop/Antigravity/Network%20SDN%20Controller/app/main.py#L272-L456))
*   **Logic Stages**:
    1.  **Syntax Verification**: Validates IP address structures (\`ipaddress.ip_network\`) and extracts gateway IPs.
    2.  **Tenant Boundary Isolation**: Queries \`ipam_subnets\` and \`tenant_vrfs\` to ensure the requested prefix does not overlap with any existing subnet assigned to the tenant's VRF.
    3.  **Topology Analysis**: Confirms the target switches exist and checks for VLAN collisions (VLAN ID must not map to another VRF on the same fabric).
    4.  **Dry-Run Engine**: Invokes the southbound driver to output the raw configuration payloads. If \`dry_run\` is requested, execution terminates here and returns the diffs. Otherwise, state is written to the DB and Celery processes sync-tasks.

### 3.3. Config Lifecycle & Auditing
The controller tracks configuration state changes over time using append-only snapshots, verifying system compliance against three mandatory security rules.

\`\`\`mermaid
stateDiagram-v2
    [*] --> DiscoveredRaw : Onboarded via ZTP
    DiscoveredRaw --> CompliantActive : Take Initial Snapshot
    
    state CompliantActive {
        [*] --> RunComplianceAudit
        RunComplianceAudit --> PassRules : NTP, DNS, and AAA configured
        RunComplianceAudit --> FailRules : Rule Failure detected
        FailRules --> SaveFindings : Log in compliance_findings
    }
    
    CompliantActive --> ConfigurationDrifted : Manual Switch Change
    ConfigurationDrifted --> TriggerRollback : Rollback Request
    TriggerRollback --> CheckBlastRadius : Evaluate Blast Radius (Max 2 changes)
    
    state CheckBlastRadius {
        [*] --> UnderLimit : Switch is Leaf (Radius=1)
        [*] --> OverLimit : Switch is Spine (Radius=6)
        OverLimit --> ForceFourEyes : Require Platform Admin Role
        ForceFourEyes --> AuthPassed : Valid Admin JWT
        ForceFourEyes --> AuthFailed : Reject rollback (403 Forbidden)
    }

    AuthFailed --> ConfigurationDrifted
    UnderLimit --> ApplyRollback
    AuthPassed --> ApplyRollback
    ApplyRollback --> CompliantActive : Snapshot Restored
\`\`\`

*   **Auditing Rules** ([config_lifecycle.py:L89-189](file:///c:/Users/mosta/OneDrive/Desktop/Antigravity/Network%20SDN%20Controller/app/workers/config_lifecycle.py#L89-L189)):
    1.  **NTP Service Check**: Verifies that a network time protocol NTP server (default: \`192.168.100.1\`) is configured.
    2.  **DNS Client Check**: Audits the presence of nameservers (default: \`8.8.8.8\`).
    3.  **AAA Authentication Check**: Critical audit validating that local authentication rules (AAA) are enabled.
*   **Blast-Radius Protection**:
    *   Restoring configuration snapshot on a Leaf device impacts a single device (blast radius = 1).
    *   Restoring configuration snapshot on a Spine device impacts the entire leaf-spine topology (blast radius = 6).
    *   If blast radius > 2, **Four-Eyes Approval** is enforced. Only users with the role \`Platform Admin\` can commit the rollback; attempts by \`Tenant Operators\` are rejected.

### 3.4. Real-Time Telemetry & Discovery
Discovery of network elements runs inside background asyncio loops:
*   **LLDP Topology Discovery**: Periodically connects to switches (both Nokia and Dell OS10 in production) via gNMI (\`pygnmi\` client), subscribing to \`/system/lldp\`. It updates the \`topology_edges\` and \`topology_nodes\` tables ([gnmi_discovery.py:L8-134](file:///c:/Users/mosta/OneDrive/Desktop/Antigravity/Network%20SDN%20Controller/app/telemetry/gnmi_discovery.py#L8-L134)).
*   **Endpoint Tracking**: Pulls MAC and ARP forwarding tables from the leaf switches, saving endpoint mappings in \`discovered_endpoints\`.
*   **Telemetry Gathering**: Polls interface input/output octets, CPU load, and chassis temperature ([metrics_collector.py](file:///c:/Users/mosta/OneDrive/Desktop/Antigravity/Network%20SDN%20Controller/app/telemetry/metrics_collector.py)).

## 5. Northbound REST API Reference

The controller features an authenticated OpenAPI v3 catalog for programmatic interactions.

### Authentication & Mock Tokens
Write requests require a JWT bearer token passed in the \`Authorization\` header.
*   **Platform Admin Mock Token**: \`mock-token-admin\` (Gives read/write permission across all tenant layers)
*   **Tenant Operator Mock Token**: \`mock-token-operator-<tenant_uuid>\` (Permits modification only inside designated tenant)
*   **Tenant Auditor Mock Token**: \`mock-token-auditor-<tenant_uuid>\` (Permits read-only queries inside designated tenant)

### API Endpoints Summary

| Endpoint Route | HTTP Method | Authentication | Description |
| :--- | :--- | :--- | :--- |
| \`/api/v5/auth/login\` | \`POST\` | None | Authenticates username/password and yields JWT. |
| \`/api/v5/orchestrator/policy-enforcement\` | \`POST\` | JWT Bearer | Submits network segment intent. Supports dry-run. |
| \`/api/v5/orchestrator/policy-reconciliation\` | \`POST\` | JWT Bearer | Deletes active subnet allocations and outputs rollback payloads. |
| \`/api/v5/discovery/on-boarding-ingestion\` | \`POST\` | None (ZTP Option) | Ingests hardware beacons from unprovisioned network elements. |
| \`/api/v5/visibility/snapshots\` | \`POST\` | JWT Bearer | Demands a configuration snapshot on a target switch. |
| \`/api/v5/visibility/snapshots\` | \`GET\` | JWT Bearer | Retrieves config snapshot history filtered by tenant/switch. |
| \`/api/v5/visibility/rollback\` | \`POST\` | JWT Bearer | Triggers rollback. Evaluates blast radius & checks authorization. |
| \`/api/v5/visibility/compliance/run\` | \`POST\` | JWT Bearer | Executes a compliance audit across active devices. |
| \`/api/v5/visibility/compliance/latest\` | \`GET\` | JWT Bearer | Returns findings from the latest compliance scan. |
| \`/api/v5/visibility/endpoints\` | \`GET\` | JWT Bearer | Lists learned endpoints (MAC/IP/port mappings) from fabric. |
| \`/api/v5/visibility/telemetry\` | \`GET\` | JWT Bearer | Queries telemetry series data (octets, temperature, CPU). |
| \`/api/v5/admin/stats\` | \`GET\` | JWT Bearer | Returns high-level database counts (fabrics, switches, ZTP devices). |
| \`/api/v5/admin/topology\` | \`GET\` | JWT Bearer | Exposes active link adjacencies for topology graphing. |

## 6. Development & Deployment Guide

For local validation and sandbox deployments, see the launcher steps below:

### Setup and Initialization
1.  **Clone Project & Navigate to Folder**:
    \`\`\`bash
    cd ~/sdn-controller
    \`\`\`
2.  **Spin up Core Databases (Postgres & Redis)**:
    \`\`\`bash
    docker-compose up -d
    \`\`\`
3.  **Boot Nokia & Dell Containerlab Switch Fabric**:
    \`\`\`bash
    sudo containerlab deploy -t sdn_fabric.clab.yml
    \`\`\`
4.  **Activate Virtual Environment & Run App**:
    \`\`\`bash
    source venv/bin/activate
    uvicorn app.main:app --host 0.0.0.0 --port 8000
    \`\`\`
    *On initial boot, the app seeds default tenant models, blueprints, active switches, and users if tables are empty.*

### Verification Tools
*   **SDN Admin Dashboard UI**: Access \`http://<VM_IP>:8000/\` for the integrated HTML glassmorphic dashboard interface containing interactive topology graphs, inventory views, compliance panels, and metric charts.
*   **OpenAPI Documentation**: Access \`http://<VM_IP>:8000/docs\` to execute and test API routes.
*   **Discovery Engine Sync**: Trigger a manual network discover loop via \`POST /api/v5/admin/sync-gnmi\` or \`POST /api/v5/admin/trigger-discover\` to force immediate LLDP parsing.
